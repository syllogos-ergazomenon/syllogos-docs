<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Σύλλογος Εργαζομένων — Ψηφιακό Αρχείο</title>

  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1410;
      --paper: #fdfcf9;
      --cream: #f2ece0;
      --rust: #8b3a2a;
      --gold: #c9a84c;
      --muted: #7a7060;
      --border: #e0d8c8;
      --green: #2d6a4f;
      --danger: #b3261e;
    }
    body { font-family: 'Noto Serif', Georgia, serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    #admin-bar {
      display: none;
      position: relative;
      z-index: 2;
      background: #16100a;
      color: #f0ead8;
      padding: 0.5rem 1.5rem;
      border-bottom: 2px solid var(--gold);
      align-items: center;
      gap: 1rem;
      font-size: 0.8rem;
    }
    #admin-bar.show { display: flex; }
    #admin-bar .ab-label { flex: 1; font-style: italic; color: #9a8868; }
    #admin-bar button {
      background: none;
      border: 1px solid #6a5a40;
      border-radius: 3px;
      color: #f0ead8;
      padding: 0.28rem 0.75rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.76rem;
    }

    header {
      position: relative;
      z-index: 1;
      background: var(--ink);
      color: var(--paper);
      text-align: center;
      padding: 3.5rem 1.5rem 3rem;
      border-bottom: 5px solid var(--gold);
      overflow: hidden;
    }
    .header-logo-image {
      position: absolute;
      top: 1.2rem;
      left: 1.8rem;
      height: 90px;
      width: auto;
      cursor: pointer;
    }
    .masthead-rule { width: 60px; height: 2px; background: var(--gold); margin: 0 auto 1rem; }
    header h1 { font-family: 'Marcellus', serif; font-size: clamp(1.8rem, 5vw, 3.2rem); font-weight: 400; }
    header h1 span { color: var(--gold); }
    header p.subtitle { margin-top: 0.8rem; font-style: italic; color: #d8d0c0; }
    .header-tagline { margin-top: 1rem; font-size: 0.72rem; letter-spacing: 0.18em; color: #6a6050; text-transform: uppercase; }

    .search-container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: -1.5rem auto 2.8rem;
      padding: 0 1.5rem;
    }
    #searchInput { width: 100%; padding: 1rem 1.5rem 1rem 3.2rem; border: 1px solid var(--border); border-radius: 30px; font-size: 1rem; }
    .search-icon { position: absolute; left: 2.8rem; top: 50%; transform: translateY(-50%); }

    main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 5rem; }
    .section-label { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.8rem; }
    .folder-card {
      background: white;
      border: 1px solid var(--border);
      border-top: 5px solid var(--rust);
      border-radius: 6px;
      padding: 2.5rem 1.5rem;
      cursor: pointer;
      text-align: center;
      transition: 0.3s;
    }
    .folder-card:hover { transform: translateY(-6px); box-shadow: 0 15px 35px rgba(0,0,0,0.12); }
    .f-icon { font-size: 3.5rem; }
    .f-name { margin-top: 1rem; font-size: 1.1rem; font-family: 'Marcellus', serif; }
    .f-action { margin-top: 1rem; font-size: 0.78rem; color: var(--rust); font-weight: bold; }

    #view-docs { display: none; }
    .doc-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.8rem; flex-wrap: wrap; }
    .back-btn { padding: 0.5rem 1rem; border: 1px solid var(--border); background: white; cursor: pointer; }
    .doc-title { font-family: 'Marcellus', serif; font-size: 1.4rem; flex: 1; }

    #upload-btn {
      display: none;
      background: var(--rust);
      color: white;
      border: none;
      border-radius: 25px;
      padding: 0.6rem 1.4rem;
      cursor: pointer;
    }
    #upload-btn.show { display: flex; }

    .doc-list { list-style: none; display: flex; flex-direction: column; gap: 0.7rem; }
    .doc-item {
      background: white;
      border: 1px solid var(--border);
      border-left: 4px solid var(--rust);
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.9rem 1rem;
    }
    .doc-icon { width: 40px; height: 48px; display: flex; align-items: center; justify-content: center; background: var(--cream); border: 1px solid var(--border); }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

    .empty { text-align: center; padding: 3rem; background: white; border: 1px dashed var(--border); }

    #login-overlay, #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(26,20,16,0.7);
      align-items: center;
      justify-content: center;
    }
    #login-overlay.open, #modal-overlay.open { display: flex; }

    .modal-box { background: var(--paper); border-top: 4px solid var(--rust); width: min(520px, 94vw); padding: 2rem; }
    .modal-box input, .modal-box select { width: 100%; padding: 0.55rem 0.8rem; margin-bottom: 1rem; }

    .drop-zone {
      border: 2px dashed var(--border);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.15s;
      background: rgba(255,255,255,0.65);
    }
    .drop-zone.dragover {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.15);
      transform: translateY(-1px);
    }
    .drop-zone input { display: none; }
    .drop-hint { margin-top: 0.6rem; font-size: 0.8rem; color: var(--muted); }

    .modal-actions { display: flex; gap: 0.7rem; justify-content: flex-end; margin-top: 1rem; }
    .btn-primary { background: var(--rust); color: white; border: none; padding: 0.5rem 1.2rem; cursor: pointer; }
    .btn-cancel { border: 1px solid var(--border); background: white; padding: 0.5rem 1rem; cursor: pointer; }

    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: white;
      padding: 0.8rem 1.4rem;
      border-radius: 4px;
      display: none;
      z-index: 999;
      max-width: min(900px, 92vw);
      white-space: pre-wrap;
      word-break: break-word;
    }
    #toast.show { display: block; }

    footer { background: var(--cream); padding: 3rem 1rem; text-align: center; border-top: 1px solid var(--border); }

    @media (max-width:768px) {
      .header-logo-image { position: static; display: block; margin: 0 auto 1rem; height: 70px; }
      header { padding-top: 1.5rem; }
    }
  </style>
</head>

<body>
<div id="admin-bar">
  <span class="ab-label">🔧 Λειτουργία Διαχειριστή</span>
  <button onclick="logout()">Αποσύνδεση</button>
</div>

<header>
  <img src="argo.png" alt="Αργώ" class="header-logo-image" id="logoBtn">
  <div class="masthead-rule"></div>
  <h1>Σύλλογος <span>Εργαζομένων</span></h1>
  <p class="subtitle">Ψηφιακό Αρχείο Εγγράφων Π.Ε. Μαγνησίας & Σποράδων</p>
  <p class="header-tagline">Ενότητα · Αλληλεγγύη · Αγώνας</p>
</header>

<div class="search-container" id="searchWrap">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="Αναζήτηση κατηγορίας...">
</div>

<main>
  <div id="view-folders">
    <div class="section-label"><h2>Κατηγορίες Αρχείων</h2></div>
    <div class="grid" id="folderGrid"></div>
  </div>

  <div id="view-docs">
    <div class="doc-header">
      <button class="back-btn" onclick="goToHome()">← Επιστροφή</button>
      <div class="doc-title" id="docTitle"></div>
      <button id="upload-btn" onclick="openUpload()">+ Ανέβασμα αρχείου</button>
    </div>
    <ul class="doc-list" id="docList"></ul>
  </div>
</main>

<footer>
  <p>&copy; <span id="yr"></span> Σύλλογος Εργαζομένων</p>
</footer>

<div id="login-overlay">
  <div class="modal-box">
    <h3>🔐 Σύνδεση Διαχειριστή</h3>
    <input type="password" id="pwd-input" placeholder="Κωδικός" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="login-err" style="color:var(--danger); margin-bottom:0.5rem;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('login-overlay').classList.remove('open')">Ακύρωση</button>
      <button class="btn-primary" onclick="doLogin()">Σύνδεση</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div class="modal-box">
    <h3>📤 Ανέβασμα εγγράφου</h3>

    <select id="upload-folder-select"></select>

    <input type="text" id="upload-title" placeholder="Προαιρετικός τίτλος">

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input"
        accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt"
        onchange="handleFile(this)">
      <div id="drop-text">📂 Επιλέξτε αρχείο</div>
      <div class="drop-hint">Μπορείς και drag & drop εδώ</div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeUpload()">Ακύρωση</button>
      <button class="btn-primary" id="do-upload-btn" onclick="doUpload()" disabled>Ανέβασμα</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://sjmmesnkpbeziyyrtvgo.supabase.co';
  const SUPABASE_ANON = 'PASTE_YOUR_SUPABASE_ANON_KEY_HERE'; // anon public (eyJ...)
  const BUCKET = 'eggrafa';

  // Σημείωση ασφάλειας: αυτός ο κωδικός στο frontend δεν είναι πραγματική ασφάλεια.
  // Οποιοσδήποτε δει το JS μπορεί να τον βρει. Για αληθινή ασφάλεια θέλει Supabase Auth + policies.
  const ADMIN_PASS = 'P@ssw0rd,.';

  const FOLDERS = [
    { name:'Αιτήσεις Εγγραφής-Διαγραφής', icon:'📝', folder:'aitiseis' },
    { name:'Εκδρομές', icon:'🚌', folder:'ekdromes' },
    { name:'Εκλογικά αποτελέσματα', icon:'🗳️', folder:'eklogika' },
    { name:'Ιατρικές Εξετάσεις', icon:'🏥', folder:'iatrikes' },
    { name:'Καταστατικό', icon:'📜', folder:'katastatiko' },
    { name:'ΜΑΠ', icon:'📋', folder:'map' },
    { name:'Νομοθεσία', icon:'⚖️', folder:'nomothesia' },
    { name:'Ομαδικό Ασφαλιστήριο Υγείας', icon:'🩺', folder:'asfalisterio' },
    { name:'Προσφορές', icon:'🎁', folder:'prosfores' },
    { name:'Τροποποιήσεις του Οργανισμού', icon:'🏛️', folder:'tropopoiiseis' },
    { name:'ΣΕΠΕΘ Εξοδολόγιο Πρότυπο', icon:'📊', folder:'sepeth' },
  ];

  let isAdmin = false;
  let currentFolderIdx = null;
  let selectedFile = null;

  // Cache για αποφυγή διπλών ονομάτων
  const folderIndex = new Map(); // folder -> { byDisplayLower: Map<string, storedName> }

  // -------------------------
  // Helpers: base64url UTF-8
  // -------------------------
  function b64urlEncodeUtf8(str) {
    const bytes = new TextEncoder().encode(str);
    let bin = '';
    for (const b of bytes) bin += String.fromCharCode(b);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
  }

  function b64urlDecodeUtf8(b64url) {
    let b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const bin = atob(b64);
    const bytes = new Uint8Array([...bin].map(ch => ch.charCodeAt(0)));
    return new TextDecoder().decode(bytes);
  }

  function splitNameAndExt(displayName) {
    const i = displayName.lastIndexOf('.');
    if (i <= 0 || i === displayName.length - 1) return { base: displayName, ext: '' };
    return { base: displayName.slice(0, i), ext: displayName.slice(i + 1) };
  }

  // Storage key format: u_<b64url(nameWithoutExt)>.<ext>
  function toStoredKey(displayName) {
    const { base, ext } = splitNameAndExt(displayName);
    const encodedBase = b64urlEncodeUtf8(base);
    return ext ? `u_${encodedBase}.${ext}` : `u_${encodedBase}`;
  }

  function fromStoredKey(storedName) {
    if (!storedName.startsWith('u_')) return storedName;
    const rest = storedName.slice(2);
    const i = rest.lastIndexOf('.');
    const basePart = i > 0 ? rest.slice(0, i) : rest;
    const ext = i > 0 ? rest.slice(i + 1) : '';
    try {
      const base = b64urlDecodeUtf8(basePart);
      return ext ? `${base}.${ext}` : base;
    } catch {
      return storedName;
    }
  }

  function escapeJsString(s) {
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  }

  function formatBytes(bytes) {
    if (bytes == null || isNaN(bytes)) return '';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    let b = Number(bytes);
    let u = 0;
    while (b >= 1024 && u < units.length - 1) { b /= 1024; u++; }
    return `${b.toFixed(b >= 10 || u === 0 ? 0 : 1)} ${units[u]}`;
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    return d.toLocaleString('el-GR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  function sanitizeDisplayName(name) {
    return String(name)
      .replace(/[^\p{L}\p{N}\s._-]/gu,'')
      .replace(/\s+/g,'_')
      .trim();
  }

  function ensureExtension(displayName, fallbackExt) {
    const { ext } = splitNameAndExt(displayName);
    if (ext) return displayName;
    return fallbackExt ? `${displayName}.${fallbackExt}` : displayName;
  }

  function buildFolderIndex(folder, files) {
    const byDisplayLower = new Map();
    for (const f of files) {
      const storedName = f.name;
      const displayName = fromStoredKey(storedName);
      byDisplayLower.set(displayName.toLowerCase(), storedName);
    }
    folderIndex.set(folder, { byDisplayLower });
  }

  function pickNonDuplicateDisplayName(folder, displayName) {
    const idx = folderIndex.get(folder);
    if (!idx) return displayName;

    const lower = displayName.toLowerCase();
    if (!idx.byDisplayLower.has(lower)) return displayName;

    // Αν υπάρχει, φτιάχνουμε (2), (3), ...
    const { base, ext } = splitNameAndExt(displayName);
    let n = 2;
    while (true) {
      const candidate = ext ? `${base} (${n}).${ext}` : `${base} (${n})`;
      if (!idx.byDisplayLower.has(candidate.toLowerCase())) return candidate;
      n++;
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show';
    setTimeout(()=>{ t.className=''; }, 3500);
  }

  // -------------------------
  // Navigation / Rendering
  // -------------------------
  function goToHome() {
    document.getElementById('view-folders').style.display = 'block';
    document.getElementById('view-docs').style.display = 'none';
  }

  function showFolderView() {
    document.getElementById('view-folders').style.display = 'block';
    document.getElementById('view-docs').style.display = 'none';
    renderFolders();
  }

  function showDocView(idx) {
    currentFolderIdx = idx;
    const f = FOLDERS[idx];

    document.getElementById('view-folders').style.display = 'none';
    document.getElementById('view-docs').style.display = 'block';
    document.getElementById('docTitle').textContent = f.icon + ' ' + f.name;

    if (isAdmin) document.getElementById('upload-btn').classList.add('show');
    else document.getElementById('upload-btn').classList.remove('show');

    listFiles(f.folder).then(files => renderDocs(files, f.folder));
  }

  function renderFolders(filter='') {
    const grid = document.getElementById('folderGrid');
    grid.innerHTML = '';

    FOLDERS
      .filter(f => f.name.toLowerCase().includes(filter.toLowerCase()))
      .forEach(f => {
        const card = document.createElement('div');
        card.className = 'folder-card';
        card.innerHTML = `
          <div class="f-icon">${f.icon}</div>
          <div class="f-name">${f.name}</div>
          <div class="f-action">Άνοιγμα ↗</div>
        `;
        card.onclick = () => showDocView(FOLDERS.indexOf(f));
        grid.appendChild(card);
      });
  }

  // -------------------------
  // Supabase Storage calls
  // -------------------------
  async function listFiles(folder) {
    const r = await fetch(
      `${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`,
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization':`Bearer ${SUPABASE_ANON}`,
          'apikey':SUPABASE_ANON
        },
        body:JSON.stringify({ prefix: folder + '/', limit: 100 })
      }
    );

    const data = await r.json();

    // Μερικές φορές επιστρέφει error object
    if (!r.ok) throw new Error(typeof data === 'string' ? data : JSON.stringify(data));

    // Φτιάχνουμε index για duplicates
    buildFolderIndex(folder, data);

    // Sort newest first (αν υπάρχει updated_at)
    return data.sort((a,b) => String(b.updated_at || '').localeCompare(String(a.updated_at || '')));
  }

  function fileUrl(folder, storedName) {
    return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${folder}/${encodeURIComponent(storedName)}`;
  }

  function renderDocs(files, folder) {
    const list = document.getElementById('docList');
    list.innerHTML = '';

    if (!files.length) {
      list.innerHTML = '<li class="empty">Δεν υπάρχουν αρχεία</li>';
      return;
    }

    files.forEach(f => {
      const storedName = f.name;
      const displayName = fromStoredKey(storedName);

      const size = f.metadata && (f.metadata.size ?? f.metadata.contentLength);
      const updated = f.updated_at || f.created_at;

      const li = document.createElement('li');
      li.innerHTML = `
        <div class="doc-item">
          <a href="${fileUrl(folder, storedName)}" target="_blank"
             style="flex:1;display:flex;gap:1rem;text-decoration:none;color:inherit;align-items:center;">
            <div class="doc-icon">📄</div>
            <div class="doc-info">
              <div class="doc-name">${displayName}</div>
              <div class="doc-meta">
                ${formatBytes(size)}${size ? ' · ' : ''}${formatDate(updated)}
              </div>
            </div>
          </a>

          ${
            isAdmin
              ? `
                <button title="Μετονομασία" onclick="renameFile('${folder}','${escapeJsString(storedName)}')">✏️</button>
                <button title="Διαγραφή" onclick="deleteFile('${folder}','${escapeJsString(storedName)}')">🗑️</button>
              `
              : ''
          }
        </div>
      `;
      list.appendChild(li);
    });
  }

  // -------------------------
  // Upload Modal + Drag & Drop
  // -------------------------
  function openUpload() {
    const sel = document.getElementById('upload-folder-select');
    sel.innerHTML = '';

    FOLDERS.forEach((f,i)=>{
      const o = document.createElement('option');
      o.value = i;
      o.textContent = f.icon + ' ' + f.name;
      if (i === currentFolderIdx) o.selected = true;
      sel.appendChild(o);
    });

    selectedFile = null;
    document.getElementById('upload-title').value = '';
    document.getElementById('drop-text').textContent = '📂 Επιλέξτε αρχείο';
    document.getElementById('do-upload-btn').disabled = true;

    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeUpload() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function setSelectedFile(file) {
    selectedFile = file;
    document.getElementById('drop-text').textContent = '✅ ' + file.name;
    document.getElementById('do-upload-btn').disabled = false;
  }

  function handleFile(input) {
    if (input.files && input.files[0]) setSelectedFile(input.files[0]);
  }

  async function doUpload() {
    if (!selectedFile) return;

    const idx = parseInt(document.getElementById('upload-folder-select').value, 10);
    const folder = FOLDERS[idx].folder;

    // Load existing list (για duplicates) αν δεν υπάρχει στο cache
    let existing = null;
    try {
      existing = await listFiles(folder);
    } catch {
      // αν αποτύχει η λίστα, συνεχίζουμε upload (χωρίς duplicate check)
    }

    const customTitle = document.getElementById('upload-title').value.trim();
    const originalExt = selectedFile.name.split('.').pop();

    let displayName = sanitizeDisplayName(customTitle || selectedFile.name);
    displayName = ensureExtension(displayName, originalExt);

    // Duplicate handling
    let upsert = false;
    if (existing) {
      const idxMap = folderIndex.get(folder);
      const exists = idxMap && idxMap.byDisplayLower.has(displayName.toLowerCase());

      if (exists) {
        const replace = confirm('Υπάρχει ήδη αρχείο με το ίδιο όνομα.\n\nOK: Αντικατάσταση\nCancel: Αυτόματο νέο όνομα (2), (3), ...');
        if (replace) {
          upsert = true;
        } else {
          displayName = pickNonDuplicateDisplayName(folder, displayName);
        }
      }
    }

    const storedName = toStoredKey(displayName);
    const encodedStoredName = encodeURIComponent(storedName);

    try {
      const r = await fetch(
        `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${folder}/${encodedStoredName}`,
        {
          method:'POST',
          headers:{
            'Authorization':`Bearer ${SUPABASE_ANON}`,
            'apikey':SUPABASE_ANON,
            'Content-Type': selectedFile.type || 'application/octet-stream',
            'x-upsert': upsert ? 'true' : 'false'
          },
          body: selectedFile
        }
      );

      const txt = await r.text();
      if (!r.ok) throw new Error(txt);

      closeUpload();
      showToast('Το αρχείο ανέβηκε');

      renderDocs(await listFiles(folder), folder);
    } catch(e) {
      showToast('Σφάλμα: ' + (e && e.message ? e.message : String(e)));
    }
  }

  async function deleteFile(folder, storedName) {
    if (!confirm('Να διαγραφεί;')) return;

    const encodedStoredName = encodeURIComponent(storedName);

    try {
      const r = await fetch(
        `${SUPABASE_URL}/storage/v1/object/${BUCKET}/${folder}/${encodedStoredName}`,
        {
          method:'DELETE',
          headers:{
            'Authorization':`Bearer ${SUPABASE_ANON}`,
            'apikey':SUPABASE_ANON
          }
        }
      );

      const txt = await r.text();
      if (!r.ok) throw new Error(txt);

      showToast('Διαγράφηκε');
      renderDocs(await listFiles(folder), folder);
    } catch(e) {
      showToast('Σφάλμα: ' + (e && e.message ? e.message : String(e)));
    }
  }

  // Rename: κρατάει αυτόματα την κατάληξη αν δεν τη γράψει ο χρήστης
  async function renameFile(folder, oldStoredName) {
    const oldDisplay = fromStoredKey(oldStoredName);

    const oldExt = (() => {
      const i = oldDisplay.lastIndexOf('.');
      if (i <= 0) return '';
      return oldDisplay.slice(i + 1).trim();
    })();

    const rawInput = prompt('Νέο όνομα:', oldDisplay);
    if (!rawInput) return;

    let newDisplay = sanitizeDisplayName(rawInput.trim());
    if (!newDisplay) return;

    newDisplay = ensureExtension(newDisplay, oldExt);

    if (newDisplay === oldDisplay) return;

    // Duplicate handling on rename
    await listFiles(folder);
    const idxMap = folderIndex.get(folder);
    if (idxMap && idxMap.byDisplayLower.has(newDisplay.toLowerCase())) {
      const ok = confirm('Υπάρχει ήδη αρχείο με αυτό το όνομα.\n\nΘέλεις να γίνει αυτόματο suffix (2), (3), ...;');
      if (!ok) return;
      newDisplay = pickNonDuplicateDisplayName(folder, newDisplay);
    }

    const newStoredName = toStoredKey(newDisplay);

    try {
      const r = await fetch(
        `${SUPABASE_URL}/storage/v1/object/move`,
        {
          method:'POST',
          headers:{
            'Authorization':`Bearer ${SUPABASE_ANON}`,
            'apikey':SUPABASE_ANON,
            'Content-Type':'application/json'
          },
          body:JSON.stringify({
            bucketId: BUCKET,
            sourceKey: `${folder}/${oldStoredName}`,
            destinationKey: `${folder}/${newStoredName}`
          })
        }
      );

      const txt = await r.text();
      if (!r.ok) throw new Error(txt);

      showToast('Μετονομάστηκε');
      renderDocs(await listFiles(folder), folder);
    } catch(e) {
      showToast('Σφάλμα: ' + (e && e.message ? e.message : String(e)));
    }
  }

  // -------------------------
  // Admin login
  // -------------------------
  function doLogin() {
    if (document.getElementById('pwd-input').value === ADMIN_PASS) {
      isAdmin = true;
      document.getElementById('login-overlay').classList.remove('open');
      document.getElementById('admin-bar').classList.add('show');
      document.getElementById('login-err').textContent = '';
      if (currentFolderIdx !== null) showDocView(currentFolderIdx);
    } else {
      document.getElementById('login-err').textContent = 'Λάθος κωδικός';
    }
  }

  function logout() {
    isAdmin = false;
    document.getElementById('admin-bar').classList.remove('show');
    showToast('Αποσυνδεθήκατε');
  }

  // -------------------------
  // Init + Drag&Drop wiring
  // -------------------------
  document.getElementById('logoBtn').addEventListener('click',()=>{
    let clicks = parseInt(sessionStorage.getItem('clicks') || '0', 10);
    clicks++;
    sessionStorage.setItem('clicks', clicks);
    if (clicks >= 3) {
      sessionStorage.setItem('clicks', 0);
      document.getElementById('login-overlay').classList.add('open');
    }
  });

  document.getElementById('searchInput').addEventListener('input', e=>{
    renderFolders(e.target.value);
  });

  document.getElementById('yr').textContent = new Date().getFullYear();

  // Click to pick file
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  dropZone.addEventListener('click', () => fileInput.click());

  // Drag & drop
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) setSelectedFile(file);
  });

  showFolderView();
</script>
</body>
