<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Σύλλογος Εργαζομένων — Ψηφιακό Αρχείο</title>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1a1410; --paper: #fdfcf9; --rust: #8b3a2a; --gold: #c9a84c; --border: #e0d8c8; }
    body { font-family: 'Noto Serif', serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
    #admin-bar { display: none; background: #16100a; color: #f0ead8; padding: 10px; }
    #admin-bar.show { display: flex; justify-content: space-between; }
    header { background: var(--ink); color: var(--paper); padding: 40px; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
    .folder-card { background: white; border: 1px solid var(--border); padding: 30px; cursor: pointer; text-align: center; }
    #view-docs { display: none; padding: 20px; }
    .doc-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); align-items: center; }
    .btn-primary { background: var(--rust); color: white; border: none; padding: 10px 20px; cursor: pointer; }
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    #modal-overlay.open { display: flex; }
    .modal-box { background: white; padding: 30px; width: 400px; }
  </style>
</head>
<body>

<div id="admin-bar"><span>🔧 Διαχειριστής</span><button onclick="logout()">Αποσύνδεση</button></div>
<header><h1 id="logoBtn">Σύλλογος Εργαζομένων</h1></header>

<main>
  <div id="view-folders">
    <h2>Κατηγορίες</h2>
    <div class="grid" id="folderGrid"></div>
  </div>

  <div id="view-docs">
    <button onclick="goToHome()">← Επιστροφή στην αρχική</button>
    <h2 id="docTitle"></h2>
    <button id="upload-btn" style="display:none" onclick="openUpload()">+ Ανέβασμα</button>
    <ul id="docList"></ul>
  </div>
</main>

<div id="modal-overlay">
  <div class="modal-box">
    <h3>Ανέβασμα αρχείου</h3>
    <select id="upload-folder-select"></select>
    <input type="file" id="file-input" onchange="handleFile(this)">
    <button class="btn-primary" id="do-upload-btn" onclick="doUpload()" disabled>Ανέβασμα</button>
    <button onclick="closeUpload()">Ακύρωση</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://sjmmesnkpbeziyyrtvgo.supabase.co';
const SUPABASE_ANON = 'ΤΟ_ANON_KEY_ΣΟΥ_ΕΔΩ'; 
const BUCKET = 'eggrafa';
const ADMIN_PASS = 'P@ssw0rd,.';

const FOLDERS = [
  { name:'Αιτήσεις Εγγραφής-Διαγραφής', folder:'aitiseis' },
  { name:'Εκδρομές', folder:'ekdromes' },
  { name:'Εκλογικά αποτελέσματα', folder:'eklogika' },
  { name:'Ιατρικές Εξετάσεις', folder:'iatrikes' },
  { name:'Καταστατικό', folder:'katastatiko' },
  { name:'ΜΑΠ', folder:'map' },
  { name:'Νομοθεσία', folder:'nomothesia' },
  { name:'Ομαδικό Ασφαλιστήριο Υγείας', folder:'asfalisterio' },
  { name:'Προσφορές', folder:'prosfores' },
  { name:'Τροποποιήσεις του Οργανισμού', folder:'tropopoiiseis' },
  { name:'ΣΕΠΕΘ Εξοδολόγιο Πρότυπο', folder:'sepeth' }
];

let isAdmin = false, currentFolderIdx = null, selectedFile = null;

function goToHome() {
  document.getElementById('view-folders').style.display = 'block';
  document.getElementById('view-docs').style.display = 'none';
}

function showDocView(idx) {
  currentFolderIdx = idx;
  const f = FOLDERS[idx];
  document.getElementById('view-folders').style.display = 'none';
  document.getElementById('view-docs').style.display = 'block';
  document.getElementById('docTitle').textContent = f.name;
  document.getElementById('upload-btn').style.display = isAdmin ? 'block' : 'none';
  listFiles(f.folder).then(files => renderDocs(files, f.folder));
}

function renderFolders() {
  const grid = document.getElementById('folderGrid');
  grid.innerHTML = '';
  FOLDERS.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'folder-card';
    card.textContent = f.name;
    card.onclick = () => showDocView(i);
    grid.appendChild(card);
  });
}

async function listFiles(folder) {
  const r = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${BUCKET}`, {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${SUPABASE_ANON}`, 'apikey':SUPABASE_ANON },
    body:JSON.stringify({ prefix:folder + '/', limit:100 })
  });
  return await r.json();
}

function renderDocs(files, folder) {
  const list = document.getElementById('docList');
  list.innerHTML = '';
  files.forEach(f => {
    const li = document.createElement('li');
    li.className = 'doc-item';
    li.innerHTML = `
      <a href="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${folder}/${encodeURIComponent(f.name)}" target="_blank">${f.name}</a>
      ${isAdmin ? `<button onclick="deleteFile('${folder}','${f.name}')">🗑️</button>` : ''}
    `;
    list.appendChild(li);
  });
}

async function doUpload() {
  if(!selectedFile) return;
  const folder = FOLDERS[parseInt(document.getElementById('upload-folder-select').value)].folder;
  const filename = encodeURIComponent(selectedFile.name);
  await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${folder}/${filename}`, {
    method:'POST',
    headers:{ 'Authorization':`Bearer ${SUPABASE_ANON}`, 'apikey':SUPABASE_ANON, 'x-upsert':'true' },
    body:selectedFile
  });
  closeUpload();
  renderDocs(await listFiles(folder), folder);
}

async function deleteFile(folder, filename) {
  if(!confirm('Διαγραφή;')) return;
  await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${folder}/${encodeURIComponent(filename)}`, {
    method:'DELETE',
    headers:{ 'Authorization':`Bearer ${SUPABASE_ANON}`, 'apikey':SUPABASE_ANON }
  });
  renderDocs(await listFiles(folder), folder);
}

function handleFile(input) { selectedFile = input.files[0]; document.getElementById('do-upload-btn').disabled = false; }
function openUpload() { document.getElementById('modal-overlay').classList.add('open'); }
function closeUpload() { document.getElementById('modal-overlay').classList.remove('open'); }
function logout() { location.reload(); }
document.getElementById('logoBtn').onclick = () => { if(prompt('Κωδικός;') === ADMIN_PASS) { isAdmin = true; document.getElementById('admin-bar').classList.add('show'); } };

renderFolders();
</script>
</body>
</html>
